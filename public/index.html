<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte de Asesores · Serviclimas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0e0e0e;
      --surface:  #161616;
      --surface2: #1f1f1f;
      --border:   #2c2c2c;
      --accent:   #e8e8e8;
      --accent2:  #aaaaaa;
      --danger:   #e8504a;
      --warning:  #e8a23a;
      --success:  #3ec97a;
      --muted:    #777777;
      --text:     #f0f0f0;
      --radius:   10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Barlow Condensed', 'Inter', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }
    .logo span { color: var(--muted); font-weight: 700; }

    .header-right { display: flex; align-items: center; gap: 14px; }

    #status-badge { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.02em; }

    #btn-refresh {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
      transition: border-color .15s, color .15s;
    }
    #btn-refresh:hover { border-color: var(--accent2); color: var(--text); }
    #btn-refresh:disabled { opacity: 0.35; cursor: not-allowed; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    /* Summary strip */
    .summary-strip {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .stat-card .label {
      font-size: 0.73rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-card .value { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .stat-card .sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .stat-card.c-accent .value   { color: #ffffff; }
    .stat-card.c-success .value  { color: var(--success); }
    .stat-card.c-danger .value   { color: var(--danger); }
    .stat-card.c-warning .value  { color: var(--warning); }
    .stat-card.c-stagnant .value { color: #a78bfa; }

    /* Advisor cards */
    .advisors { display: flex; flex-direction: column; gap: 20px; }

    .advisor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .advisor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .advisor-left { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700;
      color: var(--accent2);
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .advisor-name { font-weight: 700; font-size: 1rem; }

    .advisor-chips { display: flex; gap: 8px; flex-wrap: wrap; }

    .chip {
      font-size: 0.73rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .chip.active   { background: rgba(240,240,240,.08); color: var(--text); }
    .chip.won      { background: rgba(62,201,122,.12);  color: var(--success); }
    .chip.lost     { background: rgba(232,80,74,.12);   color: var(--danger); }
    .chip.stagnant { background: rgba(167,139,250,.12); color: #a78bfa; }

    .chevron { color: var(--muted); font-size: 1rem; transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(180deg); }

    /* Advisor body */
    .advisor-body { display: none; }
    .advisor-body.open { display: block; }

    .sections { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 20px; }

    .section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 10px 0;
    }
    .section-title .left { display: flex; align-items: center; gap: 8px; }
    .section-title .total-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      text-transform: none;
      letter-spacing: 0;
    }
    .s-chevron {
      color: var(--muted);
      font-size: 0.75rem;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .s-chevron.closed { transform: rotate(-90deg); }
    .section-content { padding-top: 10px; }
    .section-content.hidden { display: none; }

    /* Link al lead en Kommo */
    .lead-link {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
    }
    .lead-link:hover { text-decoration: underline; opacity: 0.8; }

    .section-title.c-active   { color: #d4d4d4; }
    .section-title.c-won      { color: var(--success); }
    .section-title.c-lost     { color: var(--danger); }
    .section-title.c-service  { color: var(--warning); }
    .section-title.c-stagnant { color: #a78bfa; }

    .section-title.c-active   .total-badge { background: rgba(240,240,240,.08); color: #d4d4d4; }
    .section-title.c-won      .total-badge { background: rgba(62,201,122,.12);  color: var(--success); }
    .section-title.c-lost     .total-badge { background: rgba(232,80,74,.12);   color: var(--danger); }
    .section-title.c-service  .total-badge { background: rgba(232,162,58,.12);  color: var(--warning); }
    .section-title.c-stagnant .total-badge { background: rgba(167,139,250,.12); color: #a78bfa; }

    /* Tabla estancados */
    .stagnant-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .stagnant-table th {
      text-align: left; padding: 6px 10px;
      color: var(--muted); font-size: 0.72rem; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .stagnant-table td { padding: 8px 10px; border-bottom: 1px solid rgba(46,51,80,.4); }
    .stagnant-table tr:last-child td { border-bottom: none; }
    .stagnant-table .lead-name { font-weight: 600; }
    .stagnant-table .stage-label {
      font-size: 0.72rem; color: var(--muted);
      background: var(--surface2); border-radius: 4px;
      padding: 1px 6px; display: inline-block; margin-top: 2px;
    }
    .days-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
      background: rgba(167,139,250,.12); color: #a78bfa;
      white-space: nowrap;
    }

    /* Mini table */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .mini-table th {
      text-align: left; padding: 6px 10px;
      color: var(--muted); font-size: 0.72rem; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .mini-table td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(46,51,80,.4);
    }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .mini-table .stage-name { font-weight: 600; }
    .mini-table .count-cell { color: var(--muted); }

    /* Stage bar */
    .stage-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .stage-bar-fill {
      height: 3px;
      border-radius: 2px;
      background: var(--accent2);
      min-width: 3px;
    }

    /* Won row */
    .won-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
      font-size: 0.9rem;
    }
    .won-row .big-value { font-size: 1.4rem; font-weight: 700; color: var(--success); }
    .won-row .meta { color: var(--muted); font-size: 0.82rem; }

    /* Service type pills */
    .service-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .service-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.82rem;
    }
    .service-pill .pill-name { font-weight: 600; color: var(--warning); }
    .service-pill .pill-meta { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }

    /* Separator */
    .sep { border: none; border-top: 1px solid var(--border); margin-top: 20px; }

    #loading {
      padding: 60px 24px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }
    .loading-bar {
      width: 220px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin: 18px auto 0;
    }
    .loading-bar-fill {
      height: 100%;
      width: 40%;
      background: var(--text);
      border-radius: 2px;
      animation: bar-slide 1.4s ease-in-out infinite;
    }
    @keyframes bar-slide {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }
    #error-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--danger);
    }

    /* Filter bar */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-bar label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .filter-bar input[type="date"],
    .filter-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.83rem;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }
    .filter-bar input[type="date"]:focus,
    .filter-select:focus { border-color: var(--accent); }
    .filter-select { min-width: 170px; }

    .filter-sep { color: var(--border); font-size: 0.9rem; }

    .seg-buttons { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .seg-btn {
      padding: 6px 13px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .seg-btn.active { background: var(--text); color: #0e0e0e; }

    .quick-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .qf-btn {
      padding: 5px 11px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .qf-btn:hover, .qf-btn.active { border-color: var(--text); color: var(--text); }

    .filter-divider {
      width: 1px; height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      header { padding: 12px 14px; }
      .container { padding: 16px 12px; }
      .advisor-header { padding: 14px 14px; }
      .sections { padding: 0 14px 18px; }
      .advisor-chips { display: none; }
      .filter-divider { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Niutec <span>/</span> Reporte Asesores</div>
  <div class="header-right">
    <span id="status-badge">Cargando...</span>
    <button id="btn-refresh">⟳ Actualizar</button>
  </div>
</header>

<div class="container">
  <div id="loading">
    Obteniendo datos de Kommo...
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>
  <div id="error-msg" style="display:none;"></div>
  <div id="content" style="display:none;">

    <!-- Filtros -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Asesor</label>
        <select id="advisor-select" class="filter-select">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-group">
        <label>Servicio</label>
        <select id="service-select" class="filter-select" style="min-width:140px">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-group">
        <label>Filtrar por</label>
        <div class="seg-buttons">
          <button class="seg-btn active" data-field="created_at">Creación</button>
          <button class="seg-btn"        data-field="closed_at">Cierre</button>
        </div>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-group">
        <label>Periodo</label>
        <div class="quick-filters">
          <button class="qf-btn" data-preset="today">Hoy</button>
          <button class="qf-btn" data-preset="week">Esta semana</button>
          <button class="qf-btn" data-preset="month">Este mes</button>
          <button class="qf-btn" data-preset="last_month">Mes anterior</button>
          <button class="qf-btn" data-preset="year">Este año</button>
          <button class="qf-btn active" data-preset="all">Todo</button>
        </div>
      </div>

      <div class="filter-divider"></div>

      <div class="filter-group">
        <label>Personalizado</label>
        <input type="date" id="date-from" title="Desde" />
        <span class="filter-sep">→</span>
        <input type="date" id="date-to" title="Hasta" />
      </div>
    </div>

    <div class="summary-strip" id="summary-strip"></div>
    <div id="pipeline-section" style="margin-bottom:20px;"></div>
    <div class="advisors" id="advisors-list"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const statusBadge = $('status-badge');
  const btnRefresh  = $('btn-refresh');
  const loadingEl   = $('loading');
  const errorEl     = $('error-msg');
  const contentEl   = $('content');

  let allAdvisors = []; // cache para filtro de asesor

  function applyAdvisorFilter() {
    const selected = $('advisor-select').value;
    const cards    = document.querySelectorAll('.advisor-card[data-advisor-id]');

    cards.forEach(card => {
      card.style.display = (!selected || card.dataset.advisorId === selected) ? '' : 'none';
    });

    const visible = selected
      ? allAdvisors.filter(a => String(a.advisorId) === selected)
      : allAdvisors;

    // Pipeline breakdown from visible advisors' stage data
    const pipelineMap = {};
    visible.forEach(a => {
      (a.active.byStage || []).forEach(s => {
        const pid = s.pipelineId != null ? s.pipelineId : 'unknown';
        if (!pipelineMap[pid]) pipelineMap[pid] = { name: s.pipelineName || 'Sin embudo', count: 0, value: 0 };
        pipelineMap[pid].count += s.count;
        pipelineMap[pid].value += s.value;
      });
    });
    const byPipeline = Object.values(pipelineMap).sort((a, b) => b.count - a.count);

    const totals = {
      totalLeads:       visible.reduce((s, a) => s + a.active.count + a.won.count + a.lost.count, 0),
      totalActive:      visible.reduce((s, a) => s + a.active.count, 0),
      totalWon:         visible.reduce((s, a) => s + a.won.count, 0),
      totalLost:        visible.reduce((s, a) => s + a.lost.count, 0),
      totalStagnant:    visible.reduce((s, a) => s + a.stagnant.length, 0),
      totalActiveValue: visible.reduce((s, a) => s + a.active.value, 0),
      totalWonValue:    visible.reduce((s, a) => s + a.won.value, 0),
      totalLostValue:   visible.reduce((s, a) => s + a.lost.value, 0),
      totalAdvisors:    visible.length,
      tasksNoTask:      visible.reduce((s, a) => s + (a.tasks.noTask   || 0), 0),
      tasksOverdue:     visible.reduce((s, a) => s + (a.tasks.overdue  || 0), 0),
      tasksUpToDate:    visible.reduce((s, a) => s + (a.tasks.upToDate || 0), 0),
    };
    renderSummary(totals);
    renderPipelineSection(byPipeline);
  }

  // Se inicializa después de cargar datos
  document.addEventListener('advisor-select-ready', () => {
    $('advisor-select').addEventListener('change', applyAdvisorFilter);
  });

  // ── Filtro de fechas ──────────────────────────────────────────────────────
  let currentField       = 'created_at';
  let currentFrom        = null;
  let currentTo          = null;
  let currentServiceType = '';
  window.kommoSubdomain  = '';

  // Convierte "YYYY-MM-DD" a ISO usando hora LOCAL (no UTC).
  // Kommo almacena timestamps como Unix segundos (epoch); los comparamos
  // en ms en el servidor. Usar hora local evita el desfase de 6h con México.
  function toISO(dateStr, endOfDay = false) {
    if (!dateStr) return null;
    const [y, m, d] = dateStr.split('-').map(Number);
    const date = endOfDay
      ? new Date(y, m - 1, d, 23, 59, 59, 999)
      : new Date(y, m - 1, d, 0, 0, 0, 0);
    return date.toISOString();
  }

  function applyPreset(preset) {
    const now   = new Date();
    const y     = now.getFullYear();
    const m     = now.getMonth();
    const d     = now.getDate();
    const pad   = n => String(n).padStart(2, '0');
    const ymd   = dt => `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;

    let from = null, to = null;

    if (preset === 'today') {
      from = to = ymd(now);
    } else if (preset === 'week') {
      const mon = new Date(y, m, d - ((now.getDay() + 6) % 7));
      from = ymd(mon);
      to   = ymd(now);
    } else if (preset === 'month') {
      from = `${y}-${pad(m+1)}-01`;
      to   = ymd(now);
    } else if (preset === 'last_month') {
      const lm = new Date(y, m, 0);
      from = `${lm.getFullYear()}-${pad(lm.getMonth()+1)}-01`;
      to   = ymd(lm);
    } else if (preset === 'year') {
      from = `${y}-01-01`;
      to   = ymd(now);
    } else {
      from = to = null; // 'all'
    }

    $('date-from').value = from || '';
    $('date-to').value   = to   || '';
    currentFrom = from;
    currentTo   = to;
  }

  // Botones de campo (creación / cierre)
  document.querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentField = btn.dataset.field;
      renderWithFilters();
    });
  });

  // Botones de preset
  document.querySelectorAll('.qf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPreset(btn.dataset.preset);
      // Limpiar selección personalizada si se eligió un preset
      renderWithFilters();
    });
  });

  // Inputs manuales de fecha
  $('date-from').addEventListener('change', () => {
    currentFrom = $('date-from').value;
    document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
    renderWithFilters();
  });
  $('date-to').addEventListener('change', () => {
    currentTo = $('date-to').value;
    document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
    renderWithFilters();
  });

  $('service-select').addEventListener('change', () => {
    currentServiceType = $('service-select').value;
    renderWithFilters();
  });

  async function renderWithFilters() {
    const params = new URLSearchParams({ dateField: currentField });
    if (currentFrom)        params.set('dateFrom',    toISO(currentFrom));
    if (currentTo)          params.set('dateTo',      toISO(currentTo, true));
    if (currentServiceType) params.set('serviceType', currentServiceType);

    try {
      const res  = await fetch('/api/report?' + params.toString());
      const json = await res.json();
      if (json.data) {
        json.data.totals.totalAdvisors = json.data.advisors.length;
        renderSummary(json.data.totals);
        renderAdvisors(json.data.advisors);
        applyAdvisorFilter(); // re-aplicar filtro de asesor si hay uno activo
      }
    } catch { /* silent */ }
  }

  const fmt = n => (n || 0).toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const fmtMXN = n => '$' + fmt(n);
  const initials = name => name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();

  function renderSummary(totals) {
    const eficacia = totals.totalActive > 0
      ? Math.round((1 - (totals.totalStagnant || 0) / totals.totalActive) * 100)
      : null;
    const eficaciaColor = eficacia === null ? 'var(--muted)'
      : eficacia >= 80 ? 'var(--success)'
      : eficacia >= 50 ? 'var(--warning)'
      : 'var(--danger)';

    $('summary-strip').innerHTML = `
      <div class="summary-row">
        <div class="stat-card c-accent">
          <div class="label">En pipeline</div>
          <div class="value">${fmt(totals.totalActive)}</div>
          <div class="sub">${fmtMXN(totals.totalActiveValue)}</div>
        </div>
        <div class="stat-card c-stagnant">
          <div class="label">Estancados +72h</div>
          <div class="value">${fmt(totals.totalStagnant || 0)}</div>
          <div class="sub">leads sin movimiento</div>
        </div>
        <div class="stat-card">
          <div class="label">Eficacia</div>
          <div class="value" style="color:${eficaciaColor}">${eficacia !== null ? eficacia + '%' : '—'}</div>
          <div class="sub">1 − (estancados / pipeline)</div>
        </div>
        <div class="stat-card c-success">
          <div class="label">Ganados</div>
          <div class="value">${fmt(totals.totalWon)}</div>
          <div class="sub">${fmtMXN(totals.totalWonValue)}</div>
        </div>
        <div class="stat-card c-danger">
          <div class="label">Perdidos</div>
          <div class="value">${fmt(totals.totalLost)}</div>
          <div class="sub">${fmtMXN(totals.totalLostValue)}</div>
        </div>
      </div>
      <div class="summary-row">
        <div class="stat-card c-success">
          <div class="label">Tareas al día</div>
          <div class="value">${fmt(totals.tasksUpToDate || 0)}</div>
          <div class="sub">leads activos</div>
        </div>
        <div class="stat-card c-warning">
          <div class="label">Tareas vencidas</div>
          <div class="value">${fmt(totals.tasksOverdue || 0)}</div>
          <div class="sub">leads activos</div>
        </div>
        <div class="stat-card c-danger">
          <div class="label">Sin tarea</div>
          <div class="value">${fmt(totals.tasksNoTask || 0)}</div>
          <div class="sub">leads activos</div>
        </div>
      </div>
    `;
  }

  function renderActiveStages(active) {
    if (!active.count) return '';
    const maxValue = Math.max(...active.byStage.map(s => s.value), 1);
    const rows = active.byStage.map(s => {
      const pct = Math.round((s.value / maxValue) * 100);
      return `<tr>
        <td class="stage-name">${s.name}</td>
        <td class="num count-cell">${fmt(s.count)}</td>
        <td class="num">${fmtMXN(s.value)}
          <div class="stage-bar"><div class="stage-bar-fill" style="width:${pct}px;max-width:100px"></div></div>
        </td>
      </tr>`;
    }).join('');

    return `
      <div>
        <div class="section-title c-active" onclick="toggleSection(this)">
          <span class="left">Embudo activo <span class="total-badge">${fmt(active.count)} leads · ${fmtMXN(active.value)}</span></span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content">
          <table class="mini-table">
            <thead><tr><th>Etapa</th><th class="num">Leads</th><th class="num">Valor</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function renderWon(won) {
    if (!won.count) return '';
    return `
      <div>
        <div class="section-title c-won" onclick="toggleSection(this)">
          <span class="left">Ganados <span class="total-badge">${fmt(won.count)} leads · ${fmtMXN(won.value)}</span></span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content">
          <div class="won-row">
            <div class="big-value">${fmtMXN(won.value)}</div>
            <div class="meta">${fmt(won.count)} lead${won.count !== 1 ? 's' : ''} cerrado${won.count !== 1 ? 's' : ''} exitosamente</div>
          </div>
        </div>
      </div>`;
  }

  function renderLost(lost) {
    if (!lost.count) return '';
    const rows = lost.byReason.map(r => `<tr>
      <td>${r.reason}</td>
      <td class="num count-cell">${fmt(r.count)}</td>
      <td class="num">${fmtMXN(r.value)}</td>
    </tr>`).join('');

    return `
      <div>
        <div class="section-title c-lost" onclick="toggleSection(this)">
          <span class="left">Perdidos <span class="total-badge">${fmt(lost.count)} leads · ${fmtMXN(lost.value)}</span></span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content">
          <table class="mini-table">
            <thead><tr><th>Razón</th><th class="num">Leads</th><th class="num">Valor</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function fmtHours(h) {
    if (h < 48)  return `${h}h`;
    const days = Math.floor(h / 24);
    return `${days}d`;
  }

  function renderStagnant(stagnant) {
    if (!stagnant.length) return '';
    const rows = stagnant.map(l => {
      const url = window.kommoSubdomain
        ? `https://${window.kommoSubdomain}.kommo.com/leads/detail/${l.id}`
        : '#';
      return `<tr>
        <td>
          <a class="lead-link" href="${url}" target="_blank" rel="noopener">${l.name}</a>
          <span class="stage-label">${l.stage}</span>
        </td>
        <td><span class="days-badge">⏱ ${fmtHours(l.hoursSince)}</span></td>
        <td style="text-align:right;font-variant-numeric:tabular-nums">${fmtMXN(l.value)}</td>
      </tr>`;
    }).join('');

    return `
      <div>
        <div class="section-title c-stagnant" onclick="toggleSection(this)">
          <span class="left">Estancados +72h <span class="total-badge">${fmt(stagnant.length)} leads</span></span>
          <span class="s-chevron closed">▾</span>
        </div>
        <div class="section-content hidden">
          <table class="stagnant-table">
            <thead><tr><th>Lead</th><th>Sin movimiento</th><th style="text-align:right">Valor</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function renderTasks(tasks) {
    const total = tasks.noTask + tasks.overdue + tasks.upToDate;
    if (!total) return '';
    const rows = [
      tasks.upToDate ? `<tr><td>✓ Al día</td><td class="num">${fmt(tasks.upToDate)}</td></tr>` : '',
      tasks.overdue  ? `<tr><td style="color:var(--danger)">⚠ Vencidas</td><td class="num" style="color:var(--danger)">${fmt(tasks.overdue)}</td></tr>` : '',
      tasks.noTask   ? `<tr><td style="color:var(--warning)">— Sin tarea</td><td class="num" style="color:var(--warning)">${fmt(tasks.noTask)}</td></tr>` : '',
    ].join('');
    return `
      <div>
        <div class="section-title" style="color:#d4d4d4" onclick="toggleSection(this)">
          <span class="left">Tareas <span class="total-badge" style="background:rgba(240,240,240,.08);color:#d4d4d4">${fmt(total)} leads activos</span></span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content">
          <table class="mini-table">
            <thead><tr><th>Estado</th><th class="num">Leads</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function renderServiceType(byServiceType) {
    const relevant = byServiceType.filter(s => s.type !== 'Sin clasificar');
    if (!relevant.length) return '';
    const pills = relevant.map(s => `
      <div class="service-pill">
        <div class="pill-name">${s.type}</div>
        <div class="pill-meta">${fmt(s.count)} leads · ${fmtMXN(s.value)}</div>
      </div>`).join('');
    return `
      <div>
        <div class="section-title c-service" onclick="toggleSection(this)">
          <span class="left">Servicio de interés</span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content">
          <div class="service-pills">${pills}</div>
        </div>
      </div>`;
  }

  function renderPipelineSection(byPipeline) {
    const sec = $('pipeline-section');
    if (!byPipeline || !byPipeline.length) { sec.innerHTML = ''; return; }

    const total    = byPipeline.reduce((s, p) => s + p.count, 0);
    const totalVal = byPipeline.reduce((s, p) => s + p.value, 0);
    const maxVal   = Math.max(...byPipeline.map(p => p.value), 1);

    const rows = byPipeline.map(p => {
      const pct = Math.round((p.value / maxVal) * 100);
      return `<tr>
        <td class="stage-name" style="padding-left:18px">${p.name}</td>
        <td class="num count-cell">${fmt(p.count)}</td>
        <td class="num" style="padding-right:18px">${fmtMXN(p.value)}
          <div class="stage-bar"><div class="stage-bar-fill" style="width:${pct}px;max-width:100px"></div></div>
        </td>
      </tr>`;
    }).join('');

    sec.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <div class="section-title c-active" style="padding:12px 18px;margin-bottom:0" onclick="toggleSection(this)">
          <span class="left">Por embudo <span class="total-badge">${fmt(total)} activos · ${fmtMXN(totalVal)}</span></span>
          <span class="s-chevron">▾</span>
        </div>
        <div class="section-content" style="padding-bottom:8px">
          <table class="mini-table">
            <thead><tr>
              <th style="padding-left:18px">Embudo</th>
              <th class="num">Leads activos</th>
              <th class="num" style="padding-right:18px">Valor</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function renderAdvisors(advisors) {
    const list = $('advisors-list');
    list.innerHTML = '';
    allAdvisors = advisors;

    // Poblar select de asesor
    const sel = $('advisor-select');
    const prevAdv = sel.value;
    sel.innerHTML = '<option value="">Todos los asesores</option>' +
      advisors.map(a => `<option value="${a.advisorId}">${a.advisorName}</option>`).join('');
    if (prevAdv) sel.value = prevAdv;
    document.dispatchEvent(new Event('advisor-select-ready'));

    // Poblar select de servicio con tipos únicos encontrados en los datos
    const svcSel  = $('service-select');
    const prevSvc = svcSel.value;
    const types   = [...new Set(
      advisors.flatMap(a => a.byServiceType.map(s => s.type)).filter(t => t !== 'Sin clasificar')
    )].sort();
    svcSel.innerHTML = '<option value="">Todos</option>' +
      '<option value="__none__">Sin asignar</option>' +
      types.map(t => `<option value="${t}">${t}</option>`).join('');
    if (prevSvc) svcSel.value = prevSvc;

    if (!advisors.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:20px 0;">No se encontraron asesores.</div>';
      return;
    }

    advisors.forEach(adv => {
      const el = document.createElement('div');
      el.className = 'advisor-card';
      el.dataset.advisorId = String(adv.advisorId);

      const chips = [
        adv.active.count    ? `<span class="chip active">▶ ${fmt(adv.active.count)} activos</span>` : '',
        adv.won.count       ? `<span class="chip won">✓ ${fmt(adv.won.count)} ganados</span>` : '',
        adv.lost.count      ? `<span class="chip lost">✕ ${fmt(adv.lost.count)} perdidos</span>` : '',
        adv.tasks.overdue   ? `<span class="chip lost">⚠ ${fmt(adv.tasks.overdue)} t.vencidas</span>` : '',
        adv.tasks.noTask    ? `<span class="chip" style="background:rgba(247,168,79,.12);color:var(--warning)">— ${fmt(adv.tasks.noTask)} sin tarea</span>` : '',
        adv.stagnant.length ? `<span class="chip stagnant">⏱ ${fmt(adv.stagnant.length)} estancados</span>` : '',
      ].filter(Boolean).join('');

      const body = [
        renderActiveStages(adv.active),
        renderTasks(adv.tasks),
        renderStagnant(adv.stagnant),
        renderWon(adv.won),
        renderLost(adv.lost),
        renderServiceType(adv.byServiceType),
      ].filter(Boolean).join('');

      el.innerHTML = `
        <div class="advisor-header" onclick="toggle(this)">
          <div class="advisor-left">
            <div class="avatar">${initials(adv.advisorName)}</div>
            <div>
              <div class="advisor-name">${adv.advisorName}</div>
              <div class="advisor-chips" style="margin-top:4px">${chips}</div>
            </div>
          </div>
          <span class="chevron">▼</span>
        </div>
        <div class="advisor-body">
          <div class="sections">${body || '<p style="color:var(--muted);font-size:.85rem;padding:12px 0">Sin leads registrados.</p>'}</div>
        </div>`;

      list.appendChild(el);
    });
  }

  function toggle(header) {
    const body = header.nextElementSibling;
    const ch   = header.querySelector('.chevron');
    body.classList.toggle('open');
    ch.classList.toggle('open');
  }

  function toggleSection(titleEl) {
    const content = titleEl.nextElementSibling;
    const chevron = titleEl.querySelector('.s-chevron');
    if (!content) return;
    content.classList.toggle('hidden');
    chevron.classList.toggle('closed');
  }

  async function loadReport() {
    try {
      const res  = await fetch('/api/report');
      const json = await res.json();

      if (json.isLoading) {
        statusBadge.textContent = '⏳ Actualizando...';
        btnRefresh.disabled = true;
        setTimeout(loadReport, 3000);
        return;
      }

      btnRefresh.disabled = false;

      if (json.subdomain) window.kommoSubdomain = json.subdomain;

      if (json.error) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        contentEl.style.display = 'none';
        errorEl.textContent = '❌ ' + json.error;
        statusBadge.textContent = 'Error';
        return;
      }

      if (!json.data) { setTimeout(loadReport, 2000); return; }

      loadingEl.style.display = 'none';
      errorEl.style.display   = 'none';
      contentEl.style.display = 'block';

      statusBadge.textContent = json.lastUpdated
        ? 'Actualizado: ' + new Date(json.lastUpdated).toLocaleString('es-MX')
        : '—';

      const data = json.data;
      data.totals.totalAdvisors = data.advisors.length;
      renderSummary(data.totals);
      renderAdvisors(data.advisors);
      // Aplicar filtros activos tras la carga inicial
      renderWithFilters();
    } catch {
      statusBadge.textContent = 'Error de conexión';
      btnRefresh.disabled = false;
      setTimeout(loadReport, 5000);
    }
  }

  btnRefresh.addEventListener('click', async () => {
    btnRefresh.disabled = true;
    statusBadge.textContent = '⏳ Actualizando...';
    await fetch('/api/refresh', { method: 'POST' });
    setTimeout(loadReport, 1500);
  });

  loadReport();
</script>
</body>
</html>
